# SDA Bot Configuration
# Diese Datei enthält alle Konfigurationsparameter für den SDA-Bot

# Telegram-Konfiguration (optional, fallback auf .env)
# telegram_bot_token: "your_bot_token"
# telegram_chat_id: "your_chat_id"
# SDA Bot Configuration - Multi-ETF Support
# Globale Parameter gelten für alle ETFs, ETF-spezifische Werte können überschrieben werden

# ---------------------------------------------------------------------------
# GLOBALE PARAMETER (für alle ETFs gültig)
# ---------------------------------------------------------------------------
global:
  vix_ticker: "^VIX"
  slippage: 0.0005
  vix_threshold: 15.0
  min_order_eur: 100.0
  ocf_target: 100.0
  cooldown_min: 5
  ocf_low_pct: 0.30
  ocf_mid_pct: 1.00
  t1_requires_above_sma200: true
  
  # Dip-Buy Tiers
  dip_tiers:
    - [ -0.05, 0.20, "T1" ]
    - [ -0.10, 0.30, "T2" ]
    - [ -0.20, 0.40, "T3" ]
    - [ -0.30, 0.50, "T4" ]
    - [ -0.40, 0.60, "T5" ]

# ---------------------------------------------------------------------------
# ETF-SPEZIFISCHE PARAMETER
# ---------------------------------------------------------------------------
etfs:
  SNAW.DE: # iShares MSCI World Screened UCITS ETF USD (Acc) IE00BFNM3J75 Ziel: 65 %
    monthly_contribution: 300.0
    monthly_savings: 150.0
  
  IUSN.DE: # iShares MSCI World Small Cap UCITS ETF IE00BF4RFH31 bis 15%
    monthly_contribution: 30.0
    monthly_savings: 15.0
  
  IS3N.DE: # iShares Core MSCI Emerging Markets IMI UCITS ETF (Acc) IE00BKM4GZ66 bis 10%
    monthly_contribution: 20.0
    monthly_savings: 10.0

  IQQ6.DE: # SXRA.DE: # iShares Developed Markets Property Yield UCITS ETF IE00B1FZS350 bis 5%
    monthly_contribution: 10.0
    monthly_savings: 5.0
